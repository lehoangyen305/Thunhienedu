<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Thu Nhiên Education</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Main Content */
        .main {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            padding: 30px;
        }

        /* Left Panel - Form */
        .form-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .form-panel h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        .btn-export {
            background: #10b981;
            color: white;
            margin-top: 10px;
            width: 100%;
        }

        .btn-export:hover {
            background: #059669;
        }

        /* Right Panel - Table */
        .table-panel {
            display: flex;
            flex-direction: column;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }

        .search-box::after {
            content: "🔍";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .filter-status {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            background: white;
            cursor: pointer;
        }

        .filter-status:hover {
            border-color: #667eea;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .number {
            font-size: 24px;
            font-weight: bold;
        }

        .stat-box .label {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #667eea;
            border-bottom: 2px solid #e9ecef;
            white-space: nowrap;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-new {
            background: #fef3c7;
            color: #92400e;
        }

        .status-contacted {
            background: #dbeafe;
            color: #0c4a6e;
        }

        .status-purchased {
            background: #dcfce7;
            color: #166534;
        }

        .action-btn {
            padding: 4px 8px;
            font-size: 11px;
            margin-right: 5px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }

        .action-btn:hover {
            background: #f0f0f0;
        }

        .action-btn.delete {
            color: #dc2626;
            border-color: #fca5a5;
        }

        .action-btn.delete:hover {
            background: #fee2e2;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #667eea;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-body p {
            margin-bottom: 10px;
            font-size: 13px;
        }

        .modal-body strong {
            color: #667eea;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
        }

        .modal-footer button {
            flex: 1;
        }

        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            table {
                font-size: 11px;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">🎓</div>
            <h1>CRM Thu Nhiên Education</h1>
            <p>Quản lý khách hàng đăng ký khóa học</p>
        </div>

        <!-- Main Content -->
        <div class="main">
            <!-- Form Panel -->
            <div class="form-panel">
                <h2>📝 Thêm Khách Mới</h2>
                
                <div class="form-group">
                    <label>Tên Khách *</label>
                    <input type="text" id="name" placeholder="Nguyễn Văn A">
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="abc@example.com">
                </div>

                <div class="form-group">
                    <label>Số Điện Thoại</label>
                    <input type="tel" id="phone" placeholder="0912345678">
                </div>

                <div class="form-group">
                    <label>Ngành Nghề</label>
                    <input type="text" id="industry" placeholder="VD: Kinh doanh, Marketing...">
                </div>

                <div class="form-group">
                    <label>Nơi Ở</label>
                    <input type="text" id="location" placeholder="VD: Hà Nội, TP.HCM...">
                </div>

                <div class="form-group">
                    <label>Khóa Học Quan Tâm *</label>
                    <select id="course" required>
                        <option value="">-- Chọn khóa học --</option>
                        <option value="Khóa 99k: trải nghiệm và chia sẻ">Khóa 99k: trải nghiệm và chia sẻ</option>
                        <option value="Khóa đồng hành Hiểu con hơn">Khóa đồng hành Hiểu con hơn</option>
                        <option value="Khóa đồng hành Lo lắng tuổi dậy thì">Khóa đồng hành Lo lắng tuổi dậy thì</option>
                        <option value="Khóa Phát triển Năng lực cá nhân - NLP for teens">Khóa Phát triển Năng lực cá nhân - NLP for teens</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Trạng Thái</label>
                    <select id="status">
                        <option value="chưa liên hệ">Chưa liên hệ</option>
                        <option value="đã liên hệ">Đã liên hệ</option>
                        <option value="đã mua">Đã mua</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Ghi Chú</label>
                    <textarea id="notes" placeholder="Ghi chú thêm về khách..."></textarea>
                </div>

                <div class="form-group">
                    <label>Người Quản Lý</label>
                    <input type="text" id="manager" placeholder="Tên người chịu trách nhiệm">
                </div>

                <div class="btn-group">
                    <button class="btn-primary" onclick="addCustomer()">➕ Thêm Khách</button>
                    <button class="btn-secondary" onclick="clearForm()">🔄 Xóa</button>
                </div>

                <button class="btn-export" onclick="exportToCSV()">📥 Export CSV</button>
            </div>

            <!-- Table Panel -->
            <div class="table-panel">
                <!-- Stats -->
                <div class="stats">
                    <div class="stat-box">
                        <div class="number" id="total-count">0</div>
                        <div class="label">Tổng Khách</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="new-count">0</div>
                        <div class="label">Chưa Liên Hệ</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="contacted-count">0</div>
                        <div class="label">Đã Liên Hệ</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="purchased-count">0</div>
                        <div class="label">Đã Mua</div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="controls">
                    <div class="search-box">
                        <input type="text" id="search" placeholder="Tìm theo tên, email, số điện thoại..." onkeyup="filterTable()">
                    </div>
                    <select id="filterStatus" onchange="filterTable()">
                        <option value="">Tất cả trạng thái</option>
                        <option value="chưa liên hệ">Chưa liên hệ</option>
                        <option value="đã liên hệ">Đã liên hệ</option>
                        <option value="đã mua">Đã mua</option>
                    </select>
                </div>

                <!-- Table -->
                <div class="table-wrapper">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>Tên</th>
                                <th>Email</th>
                                <th>Điện Thoại</th>
                                <th>Khóa Học</th>
                                <th>Trạng Thái</th>
                                <th>Ngày Đăng Ký</th>
                                <th>Hành Động</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 40px; color: #999;">
                                    📭 Chưa có dữ liệu. Hãy thêm khách hàng đầu tiên!
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal View Detail -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">Chi Tiết Khách Hàng</div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        // Load data from localStorage
        function loadData() {
            const stored = localStorage.getItem('crmData');
            return stored ? JSON.parse(stored) : [];
        }

        // Save data to localStorage
        function saveData(data) {
            localStorage.setItem('crmData', JSON.stringify(data));
        }

        // Add customer
        function addCustomer() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const course = document.getElementById('course').value;

            if (!name || !email || !course) {
                alert('❌ Vui lòng điền đầy đủ: Tên, Email, Khóa Học');
                return;
            }

            const data = loadData();
            const customer = {
                id: Date.now(),
                name,
                email,
                phone: document.getElementById('phone').value.trim(),
                industry: document.getElementById('industry').value.trim(),
                location: document.getElementById('location').value.trim(),
                course,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value.trim(),
                manager: document.getElementById('manager').value.trim(),
                createdDate: new Date().toLocaleDateString('vi-VN')
            };

            data.push(customer);
            saveData(data);
            clearForm();
            renderTable();
            updateStats();
            alert('✅ Thêm khách thành công!');
        }

        // Clear form
        function clearForm() {
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('industry').value = '';
            document.getElementById('location').value = '';
            document.getElementById('course').value = '';
            document.getElementById('status').value = 'chưa liên hệ';
            document.getElementById('notes').value = '';
            document.getElementById('manager').value = '';
        }

        // Render table
        function renderTable() {
            const data = loadData();
            const tbody = document.getElementById('tableBody');

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: #999;">📭 Chưa có dữ liệu. Hãy thêm khách hàng đầu tiên!</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(customer => `
                <tr>
                    <td><strong>${customer.name}</strong></td>
                    <td>${customer.email}</td>
                    <td>${customer.phone || '-'}</td>
                    <td style="font-size: 12px;">${customer.course}</td>
                    <td>
                        <span class="status-badge status-${customer.status === 'chưa liên hệ' ? 'new' : customer.status === 'đã liên hệ' ? 'contacted' : 'purchased'}">
                            ${customer.status}
                        </span>
                    </td>
                    <td>${customer.createdDate}</td>
                    <td>
                        <button class="action-btn" onclick="viewDetail(${customer.id})">👁️</button>
                        <button class="action-btn" onclick="editCustomer(${customer.id})">✏️</button>
                        <button class="action-btn delete" onclick="deleteCustomer(${customer.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        // View detail
        function viewDetail(id) {
            const data = loadData();
            const customer = data.find(c => c.id === id);
            
            if (!customer) return;

            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <p><strong>Tên:</strong> ${customer.name}</p>
                <p><strong>Email:</strong> ${customer.email}</p>
                <p><strong>Điện Thoại:</strong> ${customer.phone || '-'}</p>
                <p><strong>Ngành Nghề:</strong> ${customer.industry || '-'}</p>
                <p><strong>Nơi Ở:</strong> ${customer.location || '-'}</p>
                <p><strong>Khóa Học:</strong> ${customer.course}</p>
                <p><strong>Trạng Thái:</strong> ${customer.status}</p>
                <p><strong>Ghi Chú:</strong> ${customer.notes || '-'}</p>
                <p><strong>Người Quản Lý:</strong> ${customer.manager || '-'}</p>
                <p><strong>Ngày Đăng Ký:</strong> ${customer.createdDate}</p>
            `;
            
            modal.classList.add('active');
        }

        // Edit customer
        function editCustomer(id) {
            const data = loadData();
            const customer = data.find(c => c.id === id);
            
            if (!customer) return;

            document.getElementById('name').value = customer.name;
            document.getElementById('email').value = customer.email;
            document.getElementById('phone').value = customer.phone;
            document.getElementById('industry').value = customer.industry;
            document.getElementById('location').value = customer.location;
            document.getElementById('course').value = customer.course;
            document.getElementById('status').value = customer.status;
            document.getElementById('notes').value = customer.notes;
            document.getElementById('manager').value = customer.manager;

            deleteCustomer(id);
            document.querySelector('.form-panel h2').textContent = '✏️ Chỉnh Sửa Khách';
            
            setTimeout(() => {
                document.querySelector('.form-panel h2').textContent = '📝 Thêm Khách Mới';
            }, 2000);
        }

        // Delete customer
        function deleteCustomer(id) {
            if (!confirm('❌ Bạn chắc chắn muốn xóa?')) return;
            
            let data = loadData();
            data = data.filter(c => c.id !== id);
            saveData(data);
            renderTable();
            updateStats();
        }

        // Close modal
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Filter table
        function filterTable() {
            const searchText = document.getElementById('search').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            const data = loadData();

            const filtered = data.filter(customer => {
                const matchSearch = customer.name.toLowerCase().includes(searchText) ||
                                   customer.email.toLowerCase().includes(searchText) ||
                                   customer.phone.includes(searchText);
                
                const matchStatus = !statusFilter || customer.status === statusFilter;
                
                return matchSearch && matchStatus;
            });

            const tbody = document.getElementById('tableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: #999;">🔍 Không tìm thấy dữ liệu</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(customer => `
                <tr>
                    <td><strong>${customer.name}</strong></td>
                    <td>${customer.email}</td>
                    <td>${customer.phone || '-'}</td>
                    <td style="font-size: 12px;">${customer.course}</td>
                    <td>
                        <span class="status-badge status-${customer.status === 'chưa liên hệ' ? 'new' : customer.status === 'đã liên hệ' ? 'contacted' : 'purchased'}">
                            ${customer.status}
                        </span>
                    </td>
                    <td>${customer.createdDate}</td>
                    <td>
                        <button class="action-btn" onclick="viewDetail(${customer.id})">👁️</button>
                        <button class="action-btn" onclick="editCustomer(${customer.id})">✏️</button>
                        <button class="action-btn delete" onclick="deleteCustomer(${customer.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        // Update stats
        function updateStats() {
            const data = loadData();
            const total = data.length;
            const newCount = data.filter(c => c.status === 'chưa liên hệ').length;
            const contacted = data.filter(c => c.status === 'đã liên hệ').length;
            const purchased = data.filter(c => c.status === 'đã mua').length;

            document.getElementById('total-count').textContent = total;
            document.getElementById('new-count').textContent = newCount;
            document.getElementById('contacted-count').textContent = contacted;
            document.getElementById('purchased-count').textContent = purchased;
        }

        // Export to CSV
        function exportToCSV() {
            const data = loadData();
            if (data.length === 0) {
                alert('❌ Không có dữ liệu để export');
                return;
            }

            let csv = 'ID,Ngày Đăng Ký,Tên,Email,Số Điện Thoại,Ngành Nghề,Nơi Ở,Khóa Học,Ghi Chú,Trạng Thái,Người Quản Lý\n';
            
            data.forEach(customer => {
                const row = [
                    customer.id,
                    customer.createdDate,
                    `"${customer.name}"`,
                    customer.email,
                    customer.phone,
                    customer.industry,
                    customer.location,
                    `"${customer.course}"`,
                    `"${customer.notes}"`,
                    customer.status,
                    customer.manager
                ];
                csv += row.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', `CRM_ThuNhien_${new Date().getTime()}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            alert('✅ Export CSV thành công! File đã tải về máy.');
        }

        // Close modal when click outside
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                modal.classList.remove('active');
            }
        }

        // Initialize
        renderTable();
        updateStats();
    </script>
</body>
</html>
